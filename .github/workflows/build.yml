name: Build PulseRadio APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          GRADLE_OPTS: -Xmx6g -XX:+HeapDumpOnOutOfMemoryError

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pulseradio-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
